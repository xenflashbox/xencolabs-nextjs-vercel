<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>YAML ↔ JSON</title><style>
:root{--bg:#0b0f14;--card:#111822;--muted:#8391a2;--text:#e8eef6;--accent:#69d3f5}
*{box-sizing:border-box}body{margin:0;font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto;color:var(--text);background:#0b0f14}
.wrap{max-width:980px;margin:40px auto;padding:0 16px}
.card{background:#111822;border:1px solid #1d2633;border-radius:18px;box-shadow:0 6px 30px rgba(0,0,0,.35);overflow:hidden}
header{padding:18px 20px;border-bottom:1px solid #1d2633;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
header h1{font-size:18px;margin:0;font-weight:650}
section{padding:18px}
.nav{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
.badge{display:block;text-align:center;font-size:14px;padding:10px 12px;border:1px solid #2a3546;border-radius:12px;background:#0e1622;color:#e8eef6;text-decoration:none}
.small{font-size:12px;color:#8391a2}
textarea, input, select{width:100%;background:#0a1017;border:1px solid #1c2533;color:#e8eef6;border-radius:12px;padding:12px 14px;min-height:120px;resize:vertical}
.btns{display:flex;gap:10px;margin-top:12px}
button{border:1px solid #1f2a39;background:#0f1620;color:#e8eef6;padding:10px 14px;border-radius:12px;cursor:pointer}
.out{white-space:pre;min-height:140px}
.footer{padding:14px 20px;border-top:1px solid #1d2633;color:#8391a2;font-size:12px;display:flex;justify-content:space-between}

<!-- DM-SHELL-START -->
<link rel="stylesheet" href="/tools/assets/shell.css">
<script>
  window.TOOL_META = {
    title: 'YAML ↔ JSON',
    description: 'Free, client-side YAML ↔ JSON by Dev Maestro. Runs locally in your browser.',
    canonical: 'https://xencolabs.com/tools/yaml-json/'
  };

</style></head><body><div class="wrap"><div class="card">
<header><h1>YAML ↔ JSON</h1><div class="small">Subset: mappings, lists, scalars</div></header>
<section><textarea id="in" placeholder="name: Xenco
features:
  - tools
  - fast
count: 2"></textarea>
<div class="btns"><button id="y2j">YAML → JSON</button><button id="j2y">JSON → YAML</button></div>
<div class="small">Output</div><textarea id="out" class="out" readonly></textarea></section>
<div class="footer"><a href="/tools" class="small">All tools</a></div></div></div>
<script>
function toVal(s){s=s.trim();if(s==='null'||s==='~')return null;if(s==='true')return true;if(s==='false')return false;if(/^[-+]?\d+(\.\d+)?$/.test(s))return Number(s);return s;}
function parseYAML(y){const lines=y.replace(/\r\n?/g,'\n').split('\n');const root={};const stack=[{indent:-1,value:root,key:null,isArray:false}];for(let raw of lines){if(!raw.trim()||raw.trim().startsWith('#'))continue;const indent=(raw.match(/^\s*/)[0].length);if(indent%2!==0)throw new Error('Indent in multiples of 2');while(stack.length&&indent<=stack[stack.length-1].indent)stack.pop();const parent=stack[stack.length-1];const line=raw.trim();if(line.startsWith('- ')){if(!parent.isArray){if(parent.key!==null){parent.value[parent.key]=[];parent.isArray=true;parent.arrayRef=parent.value[parent.key];}else{if(Array.isArray(parent.value)){}else{stack[stack.length-1].value=[];parent.isArray=true;parent.arrayRef=stack[stack.length-1].value;}}}const rest=line.slice(2);if(rest.includes(': ')){const obj={};parent.arrayRef.push(obj);const idx=rest.indexOf(':');const k=rest.slice(0,idx).trim();const v=rest.slice(idx+1).trim();if(v){obj[k]=toVal(v);}stack.push({indent,value:obj,key:null,isArray:false});}else{parent.arrayRef.push(toVal(rest));}}else{const idx=line.indexOf(':');const key=line.slice(0,idx).trim();const val=line.slice(idx+1).trim();if(val===''){parent.value[key]={};stack.push({indent,value:parent.value[key],key:key,isArray:false});}else parent.value[key]=toVal(val);stack[stack.length-1].key=key;}}return root;}
function isPrim(v){return v===null||typeof v!=='object'}
function fmt(v){if(v===null)return 'null';if(typeof v==='string')return v;return String(v)}
function jsonToYaml(o, ind=''){if(Array.isArray(o))return o.map(v=>ind+'- '+(isPrim(v)?fmt(v):'\n'+jsonToYaml(v,ind+'  '))).join('\n');if(o&&typeof o==='object')return Object.keys(o).map(k=>isPrim(o[k])?`${ind}${k}: ${fmt(o[k])}`:`${ind}${k}:
${jsonToYaml(o[k],ind+'  ')}`).join('\n');return ind+fmt(o)}
document.getElementById('y2j').onclick=()=>{try{const o=parseYAML(document.getElementById('in').value);document.getElementById('out').value=JSON.stringify(o,null,2);}catch(e){document.getElementById('out').value='Error: '+e.message;}};
document.getElementById('j2y').onclick=()=>{try{const o=JSON.parse(document.getElementById('in').value);document.getElementById('out').value=jsonToYaml(o);}catch(e){document.getElementById('out').value='JSON parse error: '+e.message;}};
</script></body></html>
