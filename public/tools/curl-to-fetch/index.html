</style></head><body><div class="wrap"><div class="card">
<header><h1>cURL → fetch()</h1><div class="small">Convert a cURL command into a modern fetch() snippet (client-side only)</div></header>
<section class="grid">
<label class="small">Input cURL</label>
<textarea id="input" placeholder="curl -X POST https://api.example.com/items -H 'Content-Type: application/json' -d '{\"name\":\"Widget\"}'"></textarea>
<div class="btns">
  <button class="primary" id="convert">Convert</button>
  <button id="copy">Copy JS</button>
</div>
<div class="grid two">
  <div><div class="small">fetch() Output</div><textarea id="output" class="out" readonly></textarea></div>
  <div><div class="small">Detected</div><div id="det" class="out" style="min-height:140px"></div></div>
</div>
</section>
<div class="footer"><div>Runs locally — no uploads.</div><a href="/tools">All tools</a></div>
</div></div>
<script>
const $=id=>document.getElementById(id);
function dequote(s){if((s.startsWith('"')&&s.endsWith('"'))||(s.startsWith("'")&&s.endsWith("'"))) return s.slice(1,-1); return s;}
function splitArgs(cmd){
  const out=[]; let i=0, q=null, buf='';
  while(i<cmd.length){
    const c=cmd[i];
    if(q){
      if(c===q && cmd[i-1] !== '\\'){ buf+=c; out.push(buf); buf=''; q=null; i++; continue; }
      buf+=c; i++; continue;
    }
    if(c==='"' || c==="'"){ q=c; buf+=c; i++; continue; }
    if(/\s/.test(c)){ if(buf){ out.push(buf); buf=''; } i++; continue; }
    buf+=c; i++;
  }
  if(buf) out.push(buf);
  return out;
}
function parseCurl(raw){
  let s=raw.replace(/\r\n?/g,'\n').replace(/\\\s*\n\s*/g,' ');
  s=s.replace(/^```[\s\S]*?\n([\s\s]*?)\n```\s*$/m,'$1');
  s=s.replace(/^\s*[$#>]?\s*/mg,'');
  s=s.replace(/[“”]/g,'"').replace(/[‘’]/g,"'"); 
  if(!/^curl\b/.test(s)) s='curl '+s;
  const tokens=splitArgs(s);
  const out={method:'GET', url:'', headers:{}, body:null, isForm:false};
  for(let i=0;i<tokens.length;i++){
    const t=tokens[i];
    if(i===0 && t==='curl') continue;
    if(t==='-X'||t==='--request'){ out.method=(tokens[++i]||'GET').toUpperCase(); continue; }
    if(t==='-H'||t==='--header'){ const hv=dequote(tokens[++i]||''); const idx=hv.indexOf(':'); if(idx>-1){ const k=hv.slice(0,idx).trim(); const v=hv.slice(idx+1).trim(); out.headers[k]=v; } continue; }
    if(/^https?:/i.test(t) || /^"https?:/i.test(t) || /^'https?:/i.test(t)){ out.url=dequote(t); continue; }
    if(t==='-d'||t==='--data'||t==='--data-raw'||t==='--data-binary'){ out.body=dequote(tokens[++i]||''); if(out.method==='GET') out.method='POST'; continue; }
    if(t==='-F'||t==='--form'){ out.isForm=true; continue; }
  }
  return out;
}
function toFetch(p){
  const headers = Object.keys(p.headers).length ? JSON.stringify(p.headers, null, 2) : '{}';
  let bodyLine = '';
  if(p.body!=null){ 
    let b=p.body; let parsed=null; 
    try{ parsed=JSON.parse(b); }catch(e){}
    if(parsed){ bodyLine = '  body: ' + JSON.stringify(parsed, null, 2).split('\n').join('\n  ') + ',\n'; }
    else{ bodyLine = '  body: ' + JSON.stringify(p.body) + ',\n'; }
  } else if(p.isForm){
    bodyLine = '  // TODO: handle multipart form (-F) manually\n';
  }
  const opts = (p.method!=='GET' || bodyLine || headers!=='{}') 
    ? `, {\n  method: ${JSON.stringify(p.method)},\n  headers: ${headers},\n${bodyLine}}`
    : '';
  return `fetch(${JSON.stringify(p.url)}${opts})\n  .then(r => r.json())\n  .then(console.log)\n  .catch(console.error);`;
}
$('convert').onclick=()=>{
  const parsed=parseCurl($('input').value);
  $('det').textContent = `• Method: ${parsed.method}\n• URL: ${parsed.url}\n• Headers: ${Object.keys(parsed.headers).join(', ')||'(none)'}\n• Body: ${parsed.body!=null?'yes':'no'}\n• Form: ${parsed.isForm?'yes':'no'}`;
  $('output').value = toFetch(parsed);
};
$('copy').onclick=()=> navigator.clipboard.writeText($('output').value);
</script>
</body></html>
